name: Bump Plugin Version

# Auto-bumps the version in Plugins/jaderoad/.claude-plugin/plugin.json whenever
# changes under Plugins/jaderoad/ land on main. Without this,
# `/plugin update jaderoad@jaderoad` reports "already at the latest version"
# even after content changes were merged, because Claude Code keys plugin
# freshness off plugin.json#version.
#
# Bump type defaults to patch. Override per-commit by including one of:
#   [bump:minor]   in the merge commit message
#   [bump:major]   in the merge commit message
# Skip the bump for a particular merge by including any of:
#   [skip ci]
#   [skip bump]
# The workflow's own bump commit always includes [skip ci] so it never recurses.
#
# Also runnable on demand via workflow_dispatch (Actions tab -> Run workflow).

on:
  push:
    branches:
      - main
    paths:
      - 'Plugins/jaderoad/**'
      - '!Plugins/jaderoad/.claude-plugin/plugin.json'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: bump-plugin-version
  cancel-in-progress: false

jobs:
  bump:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!contains(github.event.head_commit.message, '[skip ci]') &&
       !contains(github.event.head_commit.message, '[skip bump]') &&
       !startsWith(github.event.head_commit.message, 'chore(release):'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type
        id: bump
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          DISPATCH_INPUT: ${{ github.event.inputs.bump_type }}
        run: |
          if [ -n "$DISPATCH_INPUT" ]; then
            TYPE="$DISPATCH_INPUT"
            REASON="workflow_dispatch input"
          elif echo "$COMMIT_MSG" | grep -qE '\[bump:major\]'; then
            TYPE="major"
            REASON="[bump:major] in commit message"
          elif echo "$COMMIT_MSG" | grep -qE '\[bump:minor\]'; then
            TYPE="minor"
            REASON="[bump:minor] in commit message"
          else
            TYPE="patch"
            REASON="default (no override)"
          fi
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "Bump type: $TYPE ($REASON)"

      - name: Compute new version and update files
        id: version
        run: |
          PLUGIN_JSON="Plugins/jaderoad/.claude-plugin/plugin.json"
          OLD=$(jq -r .version "$PLUGIN_JSON")

          if ! echo "$OLD" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Current version '$OLD' is not semver. Aborting."
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD"
          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW="$MAJOR.$MINOR.$PATCH"

          jq --arg v "$NEW" '.version = $v' "$PLUGIN_JSON" > "$PLUGIN_JSON.tmp"
          mv "$PLUGIN_JSON.tmp" "$PLUGIN_JSON"

          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped $OLD -> $NEW"

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Plugins/jaderoad/.claude-plugin/plugin.json

          if git diff --cached --quiet; then
            echo "No changes to commit (version already at target). Exiting."
            exit 0
          fi

          git commit -m "chore(release): bump plugin to v${{ steps.version.outputs.new }} [skip ci]"
          git tag "v${{ steps.version.outputs.new }}"
          git pull --rebase origin main
          git push origin main --follow-tags
